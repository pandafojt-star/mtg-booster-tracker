<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="windows-1250">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTG Booster Tracker</title>
<meta name="description" content="Stylovy MTG booster tracker se statistikami, importem/exportem a malym booster simulatorom.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/keyrune/css/keyrune.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#08110d;
  --bg-soft:#0f1e18;
  --surface:rgba(15,25,21,0.8);
  --surface-strong:rgba(18,31,26,0.96);
  --surface-alt:rgba(255,255,255,0.05);
  --border:rgba(194,178,119,0.18);
  --text:#f4f1e5;
  --muted:#b7b3a4;
  --accent:#d2b56d;
  --accent-strong:#f1c862;
  --accent-2:#78c9a1;
  --danger:#ff7b72;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
  --radius-xl:28px;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --type-play:#72c885;
  --type-set:#f0b55b;
  --type-draft:#63a8ff;
  --type-collector:#c58bff;
  --type-promo:#53d7b0;
  --type-jumpstart:#ef7bbb;
  --type-beyond:#9ccb55;
  --type-prereleasepromo:#e9d5ff;
  --type-theme:#d563df;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:"Space Grotesk",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(120,201,161,0.2), transparent 28%),
    radial-gradient(circle at top right, rgba(210,181,109,0.18), transparent 26%),
    linear-gradient(140deg, #07100d 0%, #102019 52%, #15271f 100%);
  overflow-x:hidden;
}
body::before,
body::after{
  content:"";
  position:fixed;
  inset:auto;
  width:32rem;
  height:32rem;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.16;
  pointer-events:none;
  z-index:0;
}
body::before{
  top:-8rem;
  left:-8rem;
  background:#78c9a1;
}
body::after{
  right:-10rem;
  bottom:-12rem;
  background:#d2b56d;
}
button,
input,
select{
  font:inherit;
}
button{
  border:none;
  cursor:pointer;
}
.app-shell{
  position:relative;
  z-index:1;
  width:min(1180px, calc(100% - 2rem));
  margin:0 auto;
  padding:1.25rem 0 2.5rem;
}
.card{
  background:linear-gradient(180deg, rgba(25,38,32,0.92), rgba(11,20,16,0.92));
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px);
}
.hero{
  display:grid;
  grid-template-columns:minmax(0, 1.4fr) minmax(280px, 0.8fr);
  gap:1.5rem;
  padding:1.8rem;
  overflow:hidden;
  position:relative;
}
.hero::after{
  content:"";
  position:absolute;
  inset:-20% auto auto 45%;
  width:18rem;
  height:18rem;
  background:radial-gradient(circle, rgba(241,200,98,0.18), transparent 68%);
  transform:translateZ(0);
}
.eyebrow{
  margin:0 0 0.55rem;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:0.18em;
  font-size:0.76rem;
  font-weight:700;
}
.hero h1{
  margin:0;
  font-family:"Cinzel",serif;
  font-size:clamp(2rem, 4vw, 3.6rem);
  line-height:1.04;
}
.hero-text{
  margin:0.85rem 0 0;
  max-width:58ch;
  color:var(--muted);
  font-size:1rem;
  line-height:1.65;
}
.hero-panel{
  align-self:stretch;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:1rem;
  padding:1rem;
  border-radius:calc(var(--radius-xl) - 8px);
  background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
  border:1px solid rgba(255,255,255,0.08);
}
.hero-kicker{
  margin:0;
  color:var(--muted);
  line-height:1.55;
}
.lang-switch{
  display:inline-flex;
  gap:0.5rem;
  padding:0.35rem;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  width:max-content;
}
.lang-switch button{
  min-width:3rem;
  padding:0.7rem 1rem;
  border-radius:999px;
  color:var(--text);
  background:transparent;
  transition:transform 180ms ease, background 180ms ease, color 180ms ease;
}
.lang-switch button.active{
  background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  color:#1b1504;
  font-weight:700;
}
.storage-pill{
  display:inline-flex;
  align-items:center;
  gap:0.55rem;
  width:max-content;
  padding:0.65rem 0.9rem;
  border-radius:999px;
  background:rgba(120,201,161,0.08);
  color:var(--muted);
  font-size:0.92rem;
}
.storage-dot{
  width:0.65rem;
  height:0.65rem;
  border-radius:50%;
  background:var(--accent-2);
  box-shadow:0 0 0 6px rgba(120,201,161,0.12);
}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(5, minmax(0, 1fr));
  gap:1rem;
  margin-top:1rem;
}
.stat-card{
  padding:1.2rem 1.1rem;
  position:relative;
  overflow:hidden;
}
.stat-card::after{
  content:"";
  position:absolute;
  top:-2.5rem;
  right:-2.5rem;
  width:7rem;
  height:7rem;
  background:radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
}
.stat-label{
  display:block;
  color:var(--muted);
  font-size:0.84rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
}
.stat-value{
  margin-top:0.75rem;
  display:block;
  font-size:clamp(1.4rem, 3vw, 2rem);
  font-weight:700;
}
.stat-meta{
  margin-top:0.45rem;
  color:#d4cdb9;
  font-size:0.95rem;
}
.content-grid{
  display:grid;
  grid-template-columns:minmax(0, 1.1fr) minmax(340px, 0.9fr);
  gap:1rem;
  margin-top:1rem;
}
.section-card{
  padding:1.35rem;
}
.section-head{
  display:flex;
  justify-content:space-between;
  gap:1rem;
  align-items:flex-start;
  margin-bottom:1rem;
}
.section-head h2{
  margin:0;
  font-family:"Cinzel",serif;
  font-size:1.3rem;
}
.section-head p{
  margin:0.4rem 0 0;
  color:var(--muted);
  line-height:1.55;
}
.form-grid{
  display:grid;
  grid-template-columns:1.6fr repeat(2, minmax(92px, 0.5fr));
  gap:0.85rem;
}
.field{
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}
.field label{
  color:var(--muted);
  font-size:0.92rem;
}
.field input,
.field select{
  width:100%;
  padding:0.9rem 1rem;
  color:var(--text);
  background:var(--surface-alt);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-md);
  outline:none;
  transition:border-color 180ms ease, transform 180ms ease, background 180ms ease;
}
.field input:focus,
.field select:focus{
  border-color:rgba(210,181,109,0.6);
  background:rgba(255,255,255,0.08);
  transform:translateY(-1px);
}
.type-picker{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:0.7rem;
  margin-top:1rem;
}
.type-option{
  position:relative;
}
.type-option button{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:0.65rem;
  padding:0.85rem 0.95rem;
  background:rgba(255,255,255,0.045);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--radius-md);
  transition:transform 180ms ease, border-color 180ms ease, background 180ms ease;
}
.type-option button:hover,
.type-option button:focus-visible{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,0.16);
}
.type-option button.active{
  background:rgba(255,255,255,0.1);
  border-color:var(--type-color);
  box-shadow:0 0 0 1px rgba(255,255,255,0.04), 0 12px 28px rgba(0,0,0,0.2);
}
.type-swatch{
  width:0.85rem;
  height:0.85rem;
  border-radius:50%;
  background:var(--type-color);
  box-shadow:0 0 0 5px color-mix(in srgb, var(--type-color) 16%, transparent);
}
.type-label{
  flex:1;
  text-align:left;
  font-weight:700;
}
.form-actions,
.utility-actions{
  display:flex;
  flex-wrap:wrap;
  gap:0.75rem;
  margin-top:1rem;
}
.button-primary,
.button-secondary,
.button-ghost,
.button-danger{
  padding:0.88rem 1.15rem;
  border-radius:999px;
  transition:transform 180ms ease, filter 180ms ease, background 180ms ease, color 180ms ease;
}
.button-primary:hover,
.button-secondary:hover,
.button-ghost:hover,
.button-danger:hover{
  transform:translateY(-1px);
  filter:saturate(1.05);
}
.button-primary{
  background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  color:#1e1604;
  font-weight:700;
}
.button-secondary{
  background:linear-gradient(135deg, rgba(120,201,161,0.9), rgba(85,170,133,0.92));
  color:#08110d;
  font-weight:700;
}
.button-ghost{
  background:rgba(255,255,255,0.05);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.08);
}
.button-danger{
  background:rgba(255,123,114,0.14);
  color:#ffd5d2;
  border:1px solid rgba(255,123,114,0.2);
}
.utility-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.75rem;
}
.mini-card{
  padding:1rem;
  border-radius:var(--radius-lg);
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.06);
}
.mini-card h3{
  margin:0;
  font-size:1rem;
}
.mini-card p{
  margin:0.45rem 0 0;
  color:var(--muted);
  line-height:1.5;
  font-size:0.92rem;
}
.sim-output{
  min-height:4rem;
  margin-top:1rem;
  padding:1rem;
  border-radius:var(--radius-lg);
  background:rgba(0,0,0,0.24);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--text);
  line-height:1.55;
}
.sim-context{
  margin-top:0.85rem;
  padding:0.9rem 1rem;
  border-radius:var(--radius-lg);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--muted);
  line-height:1.55;
}
.sim-context strong,
.sim-history-item strong{
  color:var(--text);
}
.sim-history{
  margin-top:0.95rem;
}
.sim-history-title{
  color:var(--muted);
  font-size:0.84rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:0.6rem;
}
.sim-history-list{
  display:flex;
  flex-direction:column;
  gap:0.6rem;
}
.sim-history-item{
  padding:0.8rem 0.9rem;
  border-radius:var(--radius-md);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
}
.sim-history-meta{
  display:block;
  margin-top:0.28rem;
  color:var(--muted);
  font-size:0.88rem;
}
.achievement-list{
  margin-top:0.9rem;
  display:flex;
  flex-wrap:wrap;
  gap:0.55rem;
}
.achievement-pill{
  display:inline-flex;
  align-items:center;
  gap:0.45rem;
  padding:0.55rem 0.8rem;
  border-radius:999px;
  background:rgba(210,181,109,0.11);
  color:#f3e1af;
  border:1px solid rgba(210,181,109,0.18);
  font-size:0.92rem;
}
.collection-card,
.analytics-card{
  margin-top:1rem;
  padding:1.35rem;
}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:0.85rem;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:1rem;
}
.toolbar-left,
.toolbar-right{
  display:flex;
  flex-wrap:wrap;
  gap:0.85rem;
  align-items:flex-end;
}
.toolbar .field{
  min-width:180px;
}
.entry-header,
.entry-row{
  display:grid;
  grid-template-columns:minmax(0, 2.4fr) 0.8fr 0.8fr 1.15fr auto;
  gap:0.8rem;
  align-items:center;
}
.entry-header{
  padding:0 0.75rem 0.7rem;
  color:var(--muted);
  font-size:0.82rem;
  letter-spacing:0.09em;
  text-transform:uppercase;
}
.entry-list{
  display:flex;
  flex-direction:column;
  gap:0.7rem;
}
.desktop-value{
  display:block;
}
.entry-meta-grid{
  display:none;
}
.entry-row{
  padding:0.9rem 1rem;
  background:rgba(255,255,255,0.04);
  border-radius:var(--radius-lg);
  border:1px solid rgba(255,255,255,0.05);
  transition:transform 180ms ease, background 180ms ease, border-color 180ms ease;
}
.entry-row:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.1);
}
.set-main{
  display:flex;
  align-items:center;
  gap:0.9rem;
  min-width:0;
}
.set-icon{
  flex:0 0 auto;
  width:2.6rem;
  height:2.6rem;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:radial-gradient(circle at top, rgba(210,181,109,0.24), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.08);
  color:var(--accent-strong);
}
.set-icon i{
  font-size:1.3rem;
}
.set-icon-fallback{
  font-weight:700;
  color:#f2d08a;
}
.set-copy{
  min-width:0;
}
.set-name{
  margin:0;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.set-date{
  margin-top:0.2rem;
  color:var(--muted);
  font-size:0.9rem;
}
.entry-value{
  font-weight:700;
}
.type-badge{
  display:inline-flex;
  align-items:center;
  gap:0.45rem;
  width:max-content;
  padding:0.55rem 0.8rem;
  border-radius:999px;
  background:color-mix(in srgb, var(--type-color) 18%, rgba(255,255,255,0.02));
  color:var(--type-color);
  border:1px solid color-mix(in srgb, var(--type-color) 30%, rgba(255,255,255,0.06));
  font-weight:700;
  font-size:0.88rem;
}
.entry-actions{
  display:flex;
  justify-content:flex-end;
}
.entry-actions button{
  min-width:2.7rem;
  height:2.7rem;
  border-radius:50%;
  background:rgba(255,123,114,0.16);
  color:#ffd7d2;
  border:1px solid rgba(255,123,114,0.22);
}
.empty-state{
  display:none;
  padding:2rem 1rem 1.2rem;
  text-align:center;
  color:var(--muted);
}
.empty-state.visible{
  display:block;
}
.analytics-grid{
  display:grid;
  grid-template-columns:minmax(0, 1.1fr) minmax(260px, 0.9fr);
  gap:1rem;
  align-items:stretch;
}
.chart-card{
  min-height:340px;
  padding:1rem;
  border-radius:var(--radius-lg);
  background:rgba(0,0,0,0.18);
  border:1px solid rgba(255,255,255,0.06);
  position:relative;
}
.chart-card canvas{
  width:100%;
  height:100%;
}
.chart-empty{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:1.5rem;
  color:var(--muted);
}
.chart-empty.visible{
  display:flex;
}
.breakdown{
  display:grid;
  grid-template-columns:1fr;
  gap:0.65rem;
}
.breakdown-card{
  padding:0.9rem 1rem;
  border-radius:var(--radius-lg);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
}
.breakdown-top{
  display:flex;
  justify-content:space-between;
  gap:0.85rem;
  align-items:center;
}
.breakdown-label{
  display:flex;
  align-items:center;
  gap:0.55rem;
  font-weight:700;
}
.breakdown-bar{
  margin-top:0.75rem;
  height:0.48rem;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  overflow:hidden;
}
.breakdown-bar span{
  display:block;
  height:100%;
  border-radius:inherit;
  background:var(--type-color);
}
.toast{
  position:fixed;
  right:1rem;
  bottom:1rem;
  padding:0.95rem 1.1rem;
  border-radius:18px;
  background:rgba(12,20,16,0.96);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  box-shadow:0 18px 40px rgba(0,0,0,0.4);
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:opacity 220ms ease, transform 220ms ease;
  max-width:min(92vw, 360px);
  z-index:3;
}
.toast.visible{
  opacity:1;
  transform:translateY(0);
}
.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}
@keyframes floatIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.hero,
.stats-grid > .card,
.content-grid > .card,
.collection-card,
.analytics-card{
  animation:floatIn 460ms ease both;
}
.stats-grid > .card:nth-child(2){animation-delay:60ms}
.stats-grid > .card:nth-child(3){animation-delay:120ms}
.stats-grid > .card:nth-child(4){animation-delay:180ms}
.stats-grid > .card:nth-child(5){animation-delay:240ms}
@media (max-width: 1080px){
  .stats-grid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
  .content-grid,
  .analytics-grid,
  .hero{
    grid-template-columns:1fr;
  }
}
@media (max-width: 820px){
  .app-shell{
    width:min(100% - 1rem, 1180px);
    padding-top:0.7rem;
  }
  .stats-grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }
  .form-grid,
  .utility-grid,
  .type-picker{
    grid-template-columns:1fr;
  }
  .entry-header{
    display:none;
  }
  .entry-row{
    grid-template-columns:1fr;
    gap:0.7rem;
  }
  .desktop-value{
    display:none;
  }
  .entry-actions{
    justify-content:flex-start;
  }
  .entry-meta-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:0.6rem;
  }
  .entry-meta-cell{
    padding:0.75rem;
    border-radius:var(--radius-md);
    background:rgba(255,255,255,0.04);
  }
  .entry-meta-label{
    display:block;
    color:var(--muted);
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:0.35rem;
  }
}
@media (max-width: 580px){
  .stats-grid{
    grid-template-columns:1fr;
  }
  .toolbar,
  .toolbar-left,
  .toolbar-right{
    align-items:stretch;
  }
  .toolbar .field{
    min-width:0;
    width:100%;
  }
  .entry-meta-grid{
    grid-template-columns:1fr;
  }
  .form-actions .button-primary,
  .form-actions .button-ghost,
  .utility-actions button{
    width:100%;
    justify-content:center;
  }
}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  *,
  *::before,
  *::after{
    animation:none !important;
    transition:none !important;
  }
}
</style>
</head>
<body>
<main class="app-shell">
  <section class="hero card">
    <div>
      <p class="eyebrow" data-i18n="eyebrow"></p>
      <h1 id="pageTitle"></h1>
      <p class="hero-text" data-i18n="heroText"></p>
    </div>
    <div class="hero-panel">
      <div>
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" data-lang-btn="cs">CZ</button>

function loadJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (error) {
    return fallback;
  }
}

function normalizeEntries(input) {
  if (!Array.isArray(input)) {
    return [];
  }
  return input
    .map((item) => normalizeEntry(item))
    .filter(Boolean);
}

function normalizeEntry(item) {
  if (!item || typeof item !== "object") {
    return null;
  }
  const name = String(item.name || "").trim();
  const type = sanitizeType(item.type);
  if (!name || !type) {
    return null;
  }
  const count = clampNumber(item.count, 1, 99999, 1);
  const boxCount = clampNumber(item.boxCount, 0, 99999, 0);
  return {
    id: String(item.id || createId()),
    name,
    count,
    boxCount,
    type,
    keyrune: item.keyrune || SET_ICONS[name.toLowerCase()] || "",
    createdAt: Number.isFinite(item.createdAt) ? item.createdAt : Date.now()
  };
}

function normalizeGame(input) {
  const game = input && typeof input === "object" ? input : {};
  return {
    boosters: clampNumber(game.boosters, 0, 999999, 0),
    mythics: clampNumber(game.mythics, 0, 999999, 0),
    rares: clampNumber(game.rares, 0, 999999, 0),
    foils: clampNumber(game.foils, 0, 999999, 0),
    lastLog: String(game.lastLog || ""),
    history: Array.isArray(game.history)
      ? game.history.map((item) => normalizePull(item)).filter(Boolean).slice(0, 10)
      : []
  };
}

function normalizePull(item) {
  if (!item || typeof item !== "object") {
    return null;
  }
  const type = sanitizeType(item.type);
  const rarity = item.rarity === "MYTHIC" ? "MYTHIC" : item.rarity === "RARE" ? "RARE" : "";
  if (!type || !rarity) {
    return null;
  }
  return {
    setName: String(item.setName || ""),
    type,
    rarity,
    foil: Boolean(item.foil),
    special: String(item.special || ""),
    at: Number.isFinite(item.at) ? item.at : Date.now()
  };
}

function normalizeAchievements(input) {
  const ids = Array.isArray(input) ? input.map(String) : [];
  return ids.filter((id) => ACHIEVEMENTS.some((achievement) => achievement.id === id));
}

function clampNumber(value, min, max, fallback) {
  const parsed = Number.parseInt(value, 10);
  if (!Number.isFinite(parsed)) {
    return fallback;
  }
  return Math.min(max, Math.max(min, parsed));
}

function sanitizeType(value) {
  const next = String(value || "").toUpperCase();
  return BOOSTER_TYPES.includes(next) ? next : "";
}

function createId() {
  if (window.crypto && typeof window.crypto.randomUUID === "function") {
    return window.crypto.randomUUID();
  }
  return `entry-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function copy(key, replacements) {
  const dictionary = COPY[state.lang] || COPY.cs;
  let text = dictionary[key] || COPY.cs[key] || key;
  if (!replacements) {
    return text;
  }
  Object.entries(replacements).forEach(([token, value]) => {
    text = text.replaceAll(`{${token}}`, value);
  });
  return text;
}

function saveState() {
  localStorage.setItem(STORAGE_KEYS.entries, JSON.stringify(state.entries));
  localStorage.setItem(STORAGE_KEYS.game, JSON.stringify(state.game));
  localStorage.setItem(STORAGE_KEYS.achievements, JSON.stringify(state.achievements));
  localStorage.setItem(STORAGE_KEYS.lang, JSON.stringify(state.lang));
}

  document.documentElement.lang = state.lang === "en" ? "en" : "cs";

        <span class="type-label">${escapeHtml(TYPE_META[type].labels[state.lang])}</span>
      </button>

function renderSuggestions() {
  const suggestionMap = new Map();
  Object.keys(SET_ICONS).forEach((name) => {
    suggestionMap.set(name.toLowerCase(), titleCase(name));
  });
  state.entries.forEach((entry) => {
    suggestionMap.set(entry.name.toLowerCase(), entry.name);
  });
  const options = Array.from(suggestionMap.values())
    .sort((a, b) => a.localeCompare(b))
    .map((name) => `<option value="${escapeAttribute(name)}"></option>`);
  elements.setSuggestions.innerHTML = options.join("");
}

function renderSortSelect() {
  const options = [
    { value: "newest", label: copy("sortNewest") },
    { value: "oldest", label: copy("sortOldest") },
    { value: "count-desc", label: copy("sortCountDesc") },
    { value: "alpha", label: copy("sortAlphabetic") }
  ];
  elements.sortSelect.innerHTML = options.map((option) => `
    <option value="${option.value}" ${state.sort === option.value ? "selected" : ""}>${escapeHtml(option.label)}</option>
  `).join("");
}

function getSummary() {
  const totals = BOOSTER_TYPES.reduce((accumulator, type) => {
    accumulator[type] = 0;
    return accumulator;
  }, {});
  let totalBoosters = 0;
  let totalBoxes = 0;
  state.entries.forEach((entry) => {
    totals[entry.type] += entry.count;
    totalBoosters += entry.count;
    totalBoxes += entry.boxCount;
  });
  const uniqueSetCount = new Set(state.entries.map((entry) => entry.name.toLowerCase())).size;
  const topTypeRecord = Object.entries(totals).sort((a, b) => b[1] - a[1])[0];
  return {
    entries: state.entries,
    totals,
    totalBoosters,
    totalBoxes,
    uniqueSetCount,
    topType: topTypeRecord && topTypeRecord[1] > 0 ? topTypeRecord[0] : "",
    topTypeCount: topTypeRecord ? topTypeRecord[1] : 0
  };
}

function renderSummary() {
  const summary = getSummary();
  elements.collectionSummary.textContent = state.lang === "cs"
    ? `${summary.entries.length} ${pluralizeCs(summary.entries.length, "záznam", "záznamy", "záznamů")}, ${summary.uniqueSetCount} ${pluralizeCs(summary.uniqueSetCount, "unikátní edice", "unikátní edice", "unikátních edic")}, ${summary.totalBoosters} ${pluralizeCs(summary.totalBoosters, "booster", "boostery", "boosterů")} celkem.`
    : copy("summary", {
        entries: String(summary.entries.length),
        unique: String(summary.uniqueSetCount),
        boosters: String(summary.totalBoosters)
      });
}

function getFilteredEntries() {
  const query = state.query.trim().toLowerCase();
  const filtered = state.entries.filter((entry) => {
    if (!query) {
      return true;
    }
    return entry.name.toLowerCase().includes(query) || entry.type.toLowerCase().includes(query);
  });
  switch (state.sort) {
    case "oldest":
      return filtered.sort((a, b) => a.createdAt - b.createdAt);
    case "count-desc":
      return filtered.sort((a, b) => b.count - a.count || b.boxCount - a.boxCount || b.createdAt - a.createdAt);
    case "alpha":
      return filtered.sort((a, b) => a.name.localeCompare(b.name));
    case "newest":
    default:
      return filtered.sort((a, b) => b.createdAt - a.createdAt);
  }
}

function renderEntries() {
  const filteredEntries = getFilteredEntries();
  elements.entryList.innerHTML = filteredEntries.map((entry) => renderEntryRow(entry)).join("");
  elements.emptyState.classList.toggle("visible", filteredEntries.length === 0);
}

    <div class="entry-meta-grid">
      <div class="entry-meta-cell">
        <span class="entry-meta-label">${escapeHtml(copy("countShort"))}</span>

        <span class="type-badge" style="--type-color:${typeMeta.color}">
          <span class="type-swatch" aria-hidden="true"></span>

  return `
    <article class="entry-row">
      <div class="set-main">

        </div>

      <div class="entry-value desktop-value">${entry.count}</div>

      <div class="desktop-value">
        <span class="type-badge" style="--type-color:${typeMeta.color}">
          <span class="type-swatch" aria-hidden="true"></span>
          ${escapeHtml(typeMeta.labels[state.lang])}

      <div class="entry-actions">
        <button type="button" data-remove-id="${escapeAttribute(entry.id)}" aria-label="${escapeAttribute(copy("removeEntry"))}">×</button>
      </div>

  `;
}

function renderStats() {
  const summary = getSummary();
  const topType = summary.topType ? TYPE_META[summary.topType].labels[state.lang] : copy("noTopType");
  elements.statTotalBoostersValue.textContent = String(summary.totalBoosters);
  elements.statTotalBoostersMeta.textContent = copy("totalBoostersMeta");
  elements.statTrackedSetsValue.textContent = String(summary.entries.length);
  elements.statTrackedSetsMeta.textContent = state.lang === "cs"
    ? `${summary.uniqueSetCount} ${pluralizeCs(summary.uniqueSetCount, "unikátní název edice", "unikátní názvy edic", "unikátních názvů edic")}`
    : copy("trackedSetsMeta", { unique: String(summary.uniqueSetCount) });
  elements.statBoxesValue.textContent = String(summary.totalBoxes);
  elements.statBoxesMeta.textContent = copy("boxesMeta");
  elements.statTopTypeValue.textContent = topType;
  elements.statTopTypeMeta.textContent = summary.topType
    ? (state.lang === "cs"
        ? `${summary.topTypeCount} ${pluralizeCs(summary.topTypeCount, "booster", "boostery", "boosterů")} v této kategorii`
        : copy("topTypeMeta", { count: String(summary.topTypeCount) }))
    : copy("chartEmpty");

  const boosters = state.game.boosters;
  const mythicRate = boosters > 0 ? state.game.mythics / boosters : 0;
  let luckLabel = copy("noTopType");
  if (boosters > 0) {
    if (mythicRate >= 0.2) {
      luckLabel = copy("luckHot");
    } else if (mythicRate >= 0.12) {
      luckLabel = copy("luckGood");
    } else if (mythicRate < 0.05) {
      luckLabel = copy("luckCold");
    } else {
      luckLabel = copy("luckNormal");
    }
  }
  elements.statLuckValue.textContent = luckLabel;
  elements.statLuckMeta.textContent = boosters > 0
    ? copy("luckMeta", { mythics: String(state.game.mythics), boosters: String(boosters) })
    : copy("noLuckMeta");
}

function renderSimulator() {
  const currentSet = elements.setName.value.trim();
  const currentCount = clampNumber(elements.count.value, 1, 36, 1);
  const currentTypeLabel = TYPE_META[state.selectedType].labels[state.lang];
  elements.simContext.innerHTML = currentSet
    ? `${escapeHtml(copy("simContextReadyLead"))} <strong>${escapeHtml(currentSet)}</strong> • ${escapeHtml(currentTypeLabel)} • x${currentCount}. ${escapeHtml(copy("simContextReadyTail"))}`
    : escapeHtml(copy("simContextMissing"));
  elements.simOutput.textContent = state.game.lastLog || copy("simIntro");
  if (!state.game.history.length) {
    elements.simHistoryList.innerHTML = `<div class="sim-history-item">${escapeHtml(copy("simHistoryEmpty"))}</div>`;
    return;
  }
  elements.simHistoryList.innerHTML = state.game.history.map((pull) => renderPullHistoryItem(pull)).join("");
}

function renderPullHistoryItem(pull) {
  const tags = [pull.rarity === "MYTHIC" ? copy("rarityMythic") : copy("rarityRare")];
  if (pull.foil) {
    tags.push(copy("simFoilLabel"));
  }
  if (pull.special) {
    tags.push(`${copy("simSpecialLabel")}: ${pull.special}`);
  }
  return `
    <div class="sim-history-item">
      <strong>${escapeHtml(pull.setName || copy("simUnknownSet"))}</strong>
      <span class="sim-history-meta">${escapeHtml(TYPE_META[pull.type].labels[state.lang])} • ${escapeHtml(tags.join(" • "))}</span>
    </div>
  `;
}

function renderAchievements() {
  elements.achievementList.innerHTML = state.achievements.map((id) => {
    const achievement = ACHIEVEMENTS.find((item) => item.id === id);
    if (!achievement) {
      return "";
    }
    return `<span class="achievement-pill">✦ ${escapeHtml(achievement.labels[state.lang])}</span>`;
  }).join("");
}

function renderAnalytics() {
  const summary = getSummary();
  const labels = BOOSTER_TYPES.map((type) => TYPE_META[type].labels[state.lang]);
  const data = BOOSTER_TYPES.map((type) => summary.totals[type]);
  const colors = BOOSTER_TYPES.map((type) => TYPE_META[type].color);
  const total = summary.totalBoosters;

  elements.breakdown.innerHTML = BOOSTER_TYPES.map((type) => {
    const count = summary.totals[type];
    const share = total > 0 ? Math.round((count / total) * 100) : 0;
    return `
      <article class="breakdown-card" style="--type-color:${TYPE_META[type].color}">
        <div class="breakdown-top">
          <div class="breakdown-label">
            <span class="type-swatch" aria-hidden="true"></span>
            <span>${escapeHtml(TYPE_META[type].labels[state.lang])}</span>
          </div>
          <strong>${count}</strong>
        </div>
        <div class="set-date">${escapeHtml(copy("typeShare", { count: String(count), share: String(share) }))}</div>
        <div class="breakdown-bar"><span style="width:${share}%"></span></div>
      </article>
    `;
  }).join("");

  elements.chartEmpty.classList.toggle("visible", total === 0);
  if (chart) {
    chart.destroy();
  }
  chart = new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: 0,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          backgroundColor: "rgba(11,20,16,0.92)",
          borderColor: "rgba(255,255,255,0.08)",
          borderWidth: 1,
          titleColor: "#f4f1e5",
          bodyColor: "#f4f1e5",
          padding: 12,
          callbacks: {
            label(context) {
              const count = context.raw;
              const share = total > 0 ? Math.round((count / total) * 100) : 0;
              return `${context.label}: ${count} (${share}%)`;
            }
          }
        }
      },
      cutout: "66%"
    }
  });
}

function upsertEntry({ name, type, count, boxCount, createdAt }) {
  const normalizedName = String(name || "").trim();
  if (!normalizedName) {
    return null;
  }
  const safeType = sanitizeType(type);
  if (!safeType) {
    return null;
  }
  const nextCount = clampNumber(count, 1, 99999, 1);
  const nextBoxCount = clampNumber(boxCount, 0, 99999, 0);
  const timestamp = Number.isFinite(createdAt) ? createdAt : Date.now();
  const existing = state.entries.find((entry) => entry.name.toLowerCase() === normalizedName.toLowerCase() && entry.type === safeType);
  if (existing) {
    existing.count += nextCount;
    existing.boxCount += nextBoxCount;
    existing.createdAt = timestamp;
    return { mode: "updated", entry: existing };
  }
  const entry = {
    id: createId(),
    name: normalizedName,
    count: nextCount,
    boxCount: nextBoxCount,
    type: safeType,
    keyrune: SET_ICONS[normalizedName.toLowerCase()] || "",
    createdAt: timestamp
  };
  state.entries.push(entry);
  return { mode: "created", entry };
}

function rollBooster(type) {
  const profile = BOOSTER_PROFILES[type] || BOOSTER_PROFILES.PLAY;
  return {
    type,
    rarity: Math.random() < profile.mythicRate ? "MYTHIC" : "RARE",
    foil: Math.random() < profile.foilRate,
    special: Math.random() < profile.specialRate
      ? SPECIAL_HITS[Math.floor(Math.random() * SPECIAL_HITS.length)]
      : ""
  };
}

function getOpenedPhrase(count) {
  if (state.lang === "cs") {
    return count === 1
      ? "Otevren 1 booster"
      : `Otevreno ${count} ${pluralizeCs(count, "booster", "boostery", "boosteru")}`;
  }
  return count === 1 ? "Opened 1 booster" : `Opened ${count} boosters`;
}

function buildBoosterSummary({ setName, type, count, mythics, rares, foils, specials, trackerResult }) {
  const summaryKey = setName ? "simSummary" : "simSummaryNoSet";
  const base = copy(summaryKey, {
    opened: getOpenedPhrase(count),
    set: setName,
    type: TYPE_META[type].labels[state.lang],
    mythics: String(mythics),
    rares: String(rares),
    foils: String(foils),
    specials: String(specials)
  });
  if (!setName) {
    return `${base} ${copy("simAutoSkipped")}`;
  }
  return `${base} ${copy(trackerResult && trackerResult.mode === "created" ? "simAutoCreated" : "simAutoUpdated")}`;
}

function addEntry() {
  const name = elements.setName.value.trim();
  if (!name) {
    showToast(copy("toastSetName"));
    elements.setName.focus();
    return;
  }
  if (!state.selectedType) {
    showToast(copy("toastSelectType"));
    return;
  }

  const count = clampNumber(elements.count.value, 1, 99999, 1);
  const boxCount = clampNumber(elements.boxCount.value, 0, 99999, 0);
  upsertEntry({ name, type: state.selectedType, count, boxCount, createdAt: Date.now() });

  maybeUnlockAchievements();
  saveState();
  clearForm();
  render();
  showToast(copy("toastAdded"));
}

function removeEntry(id) {
  if (!window.confirm(copy("removeConfirm"))) {
    return;
  }
  state.entries = state.entries.filter((entry) => entry.id !== id);
  maybeUnlockAchievements();
  saveState();
  render();
  showToast(copy("toastRemoved"));
}

function clearForm() {
  elements.setName.value = "";
  elements.count.value = "1";
  elements.boxCount.value = "0";
}

function clearAllData() {
  if (!window.confirm(copy("clearConfirm"))) {
    return;
  }
  state.entries = [];
  state.game = normalizeGame({});
  state.achievements = [];
  saveState();
  render();
  showToast(copy("toastCleared"));
}

function exportCsv() {
  const lines = [
    ["Set", "Count", "Boxes", "Type", "Created At"].join(",")
  ];
  state.entries.forEach((entry) => {
    lines.push([
      escapeCsv(entry.name),
      entry.count,
      entry.boxCount,
      entry.type,
      new Date(entry.createdAt).toISOString()
    ].join(","));
  });
  downloadFile(copy("csvName"), lines.join("\n"), "text/csv;charset=utf-8");
  showToast(copy("toastExported"));
}

function exportJson() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    entries: state.entries,
    game: state.game,
    achievements: state.achievements,
    lang: state.lang
  };
  downloadFile(copy("jsonName"), JSON.stringify(payload, null, 2), "application/json");
  showToast(copy("toastExported"));
}

function importJson() {
  elements.importInput.value = "";
  elements.importInput.click();
}

function handleImportFile(event) {
  const [file] = event.target.files || [];
  if (!file) {
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result || "{}"));
      const result = importPayload(parsed);
      maybeUnlockAchievements();
      saveState();
      render();
      showToast(copy(result.legacy ? "toastLegacyImport" : "toastImported"));
    } catch (error) {
      showToast(copy("toastImportError"));
    }
  };
  reader.readAsText(file);
}

function importPayload(payload) {
  let legacy = false;
  if (Array.isArray(payload)) {
    legacy = payload.some((item) => Array.isArray(item && item.types));
    state.entries = normalizeLegacyOrCurrentEntries(payload);
    return { legacy };
  }

  if (payload && typeof payload === "object") {
    if (Array.isArray(payload.entries)) {
      state.entries = normalizeLegacyOrCurrentEntries(payload.entries);
      state.game = normalizeGame(payload.game || state.game);
      state.achievements = normalizeAchievements(payload.achievements || state.achievements);
      if (payload.lang === "cs" || payload.lang === "en") {
        state.lang = payload.lang;
      }
      legacy = payload.version !== 2;
      return { legacy };
    }
    if (Array.isArray(payload.data) || Array.isArray(payload.sets)) {
      legacy = true;
      state.entries = normalizeLegacyOrCurrentEntries(payload.data || payload.sets);
      return { legacy };
    }
  }

  throw new Error("Unsupported payload");
}

function normalizeLegacyOrCurrentEntries(entries) {
  const output = [];
  entries.forEach((item) => {
    if (item && Array.isArray(item.types)) {
      const name = String(item.name || "").trim();
      const count = clampNumber(item.count, 1, 99999, 1);
      const boxCount = clampNumber(item.boxCount, 0, 99999, 0);
      item.types.forEach((type) => {
        const nextType = sanitizeType(type);
        if (!name || !nextType) {
          return;
        }
        output.push({
          id: createId(),
          name,
          count,
          boxCount,
          type: nextType,
          keyrune: item.keyrune || SET_ICONS[name.toLowerCase()] || "",
          createdAt: Date.now()
        });
      });
      return;
    }
    const normalized = normalizeEntry(item);
    if (normalized) {
      output.push(normalized);
    }
  });
  return output;
}

function openBooster() {
  const count = clampNumber(elements.count.value, 1, 36, 1);
  const setName = elements.setName.value.trim();
  const type = state.selectedType || "PLAY";
  let mythics = 0;
  let rares = 0;
  let foils = 0;
  let specials = 0;
  const pulls = [];

  for (let index = 0; index < count; index += 1) {
    const result = rollBooster(type);
    if (result.rarity === "MYTHIC") {
      mythics += 1;
      state.game.mythics += 1;
    } else {
      rares += 1;
      state.game.rares += 1;
    }
    if (result.foil) {
      foils += 1;
      state.game.foils += 1;
    }
    if (result.special) {
      specials += 1;
    }
    pulls.push({
      setName,
      type,
      rarity: result.rarity,
      foil: result.foil,
      special: result.special,
      at: Date.now() + index
    });
  }

  state.game.boosters += count;
  state.game.history = [...pulls.reverse(), ...state.game.history].slice(0, 10);
  const trackerResult = setName
    ? upsertEntry({ name: setName, type, count, boxCount: 0, createdAt: Date.now() })
    : null;
  state.game.lastLog = buildBoosterSummary({
    setName,
    type,
    count,
    mythics,
    rares,
    foils,
    specials,
    trackerResult
  });
  maybeUnlockAchievements();
  saveState();
  render();
}

function mysteryEvent() {
  const events = [
    copy("mysteryBlackLotus"),
    copy("mysteryTrashRare"),
    copy("mysteryDoubleMythic"),
    copy("mysteryFoil"),
    copy("mysteryHiddenBox")
  ];
  state.game.lastLog = events[Math.floor(Math.random() * events.length)];
  saveState();
  renderSimulator();
}

function maybeUnlockAchievements() {
  const summary = getSummary();
  ACHIEVEMENTS.forEach((achievement) => {
    if (state.achievements.includes(achievement.id)) {
      return;
    }
    if (achievement.test(summary, state.game)) {
      state.achievements.push(achievement.id);
      showToast(`${copy("toastAchievement")} ${achievement.labels[state.lang]}`);
    }
  });
}

function showToast(message) {
  elements.toast.textContent = message;
  elements.toast.classList.add("visible");
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => {
    elements.toast.classList.remove("visible");
  }, 2400);
}

function downloadFile(filename, contents, mimeType) {
  const blob = new Blob([contents], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  URL.revokeObjectURL(url);
}

function formatDate(timestamp) {
  if (!Number.isFinite(timestamp)) {
    return copy("fallbackDate");
  }
  return new Intl.DateTimeFormat(state.lang === "en" ? "en-GB" : "cs-CZ", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  }).format(timestamp);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function escapeAttribute(value) {
  return escapeHtml(value);
}

function escapeCsv(value) {
  return `"${String(value).replaceAll('"', '""')}"`;
}

function titleCase(value) {
  return value.replace(/\b\w/g, (match) => match.toUpperCase());
}

function setLanguage(lang) {
  if (lang !== "cs" && lang !== "en") {
    return;
  }
  state.lang = lang;
  saveState();
  render();
}

function pluralizeCs(count, one, few, many) {
  if (count === 1) {
    return one;
  }
  if (count >= 2 && count <= 4) {
    return few;
  }
  return many;
}

elements.addButton.addEventListener("click", addEntry);
elements.clearFormButton.addEventListener("click", clearForm);
elements.exportCsvButton.addEventListener("click", exportCsv);
elements.exportJsonButton.addEventListener("click", exportJson);
elements.importJsonButton.addEventListener("click", importJson);
elements.openBoosterButton.addEventListener("click", openBooster);
elements.mysteryButton.addEventListener("click", mysteryEvent);
elements.clearDataButton.addEventListener("click", clearAllData);
elements.importInput.addEventListener("change", handleImportFile);
elements.setName.addEventListener("input", renderSimulator);
elements.count.addEventListener("input", renderSimulator);
elements.searchInput.addEventListener("input", (event) => {
  state.query = event.target.value;
  renderEntries();
});
elements.sortSelect.addEventListener("change", (event) => {
  state.sort = event.target.value;
  renderEntries();
});
elements.setName.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    addEntry();
  }
});
document.addEventListener("click", (event) => {
  const typeButton = event.target.closest("[data-type]");
  if (typeButton) {
    state.selectedType = typeButton.dataset.type;
    renderTypePicker();
    renderSimulator();
    return;
  }
  const langButton = event.target.closest("[data-lang-btn]");
  if (langButton) {
    setLanguage(langButton.dataset.langBtn);
    return;
  }
  const removeButton = event.target.closest("[data-remove-id]");
  if (removeButton) {
    removeEntry(removeButton.dataset.removeId);
  }
});

render();
</script>
</body>
</html>
