<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>MTG Tracker 2.0</title>

<link rel="stylesheet" href="https://unpkg.com/keyrune/css/keyrune.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e1e2f,#2b2b40);
  color:white;
  padding:20px;
}

.panel{
  background:#2f2f4f;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

button{
  padding:7px 14px;
  border:none;
  border-radius:6px;
  background:#4caf50;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{background:#43a047;}
button:active{transform:scale(0.95);}

.deleteBtn{background:#e53935;}
.exportBtn{background:#ff9800;}

.tag{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin:2px;
  display:inline-block;
  background:#555;
}

#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  padding:10px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<h2>🎴 MTG Tracker 2.0</h2>

<div class="panel">
<input id="setName" placeholder="Set">
<input id="count" type="number" value="1">

<label><input type="checkbox" value="PLAY">PLAY</label>
<label><input type="checkbox" value="SET">SET</label>
<label><input type="checkbox" value="DRAFT">DRAFT</label>

<br><br>

<button onclick="addSet()">Add</button>
<button onclick="openBooster()">🎮 Open Booster</button>
<button onclick="mysteryEvent()">🎁 Mystery</button>

<div id="stats"></div>
<div id="luck"></div>
<div id="game"></div>
<div id="achievements"></div>
</div>

<table width="100%" style="background:white;color:black;">
<thead>
<tr><th>Set</th><th>Count</th><th>Type</th><th></th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<canvas id="chart"></canvas>

<div id="toast"></div>

<script>

// DATA
let sets = JSON.parse(localStorage.getItem("sets")) || []
let game = JSON.parse(localStorage.getItem("game")) || {
  boosters:0,mythics:0,rares:0
}
let achievements = JSON.parse(localStorage.getItem("ach")) || []

// SAVE
function save(){
  localStorage.setItem("sets",JSON.stringify(sets))
  localStorage.setItem("game",JSON.stringify(game))
  localStorage.setItem("ach",JSON.stringify(achievements))
}

// UI
function toast(msg){
  let t=document.getElementById("toast")
  t.innerText=msg
  t.style.display="block"
  setTimeout(()=>t.style.display="none",2000)
}

// ADD SET
function addSet(){
  let name=setName.value
  let count=parseInt(count.value)

  let types=[]
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(c=>types.push(c.value))

  if(!name||types.length==0)return

  sets.push({name,count,types})
  setName.value=""
  save()
  render()
}

// RENDER
function render(){
  tbody.innerHTML=""
  sets.forEach((s,i)=>{
    tbody.innerHTML+=`
    <tr>
      <td>${s.name}</td>
      <td>${s.count}</td>
      <td>${s.types.map(t=>`<span class="tag">${t}</span>`).join("")}</td>
      <td><button class="deleteBtn" onclick="del(${i})">X</button></td>
    </tr>`
  })
  updateStats()
  chartUpdate()
}

function del(i){
  sets.splice(i,1)
  save()
  render()
}

// BOOSTER GAME
function openBooster(){
  game.boosters++

  let mythic=Math.random()<0.125
  let result=mythic?"💎 MYTHIC":"🟡 Rare"

  if(mythic) game.mythics++
  else game.rares++

  gameDiv.innerText=`Booster #${game.boosters}: ${result}`

  checkAch()
  updateLuck()
  save()
}

// LUCK
function updateLuck(){
  let ratio=game.mythics/game.boosters
  let text="Normal"

  if(ratio>0.2) text="🔥 INSANE"
  else if(ratio<0.05) text="💀 CURSED"

  luck.innerText="Luck: "+text
}

// ACHIEVEMENTS
function unlock(a){
  if(!achievements.includes(a)){
    achievements.push(a)
    toast("🏆 "+a)
  }
}

function checkAch(){
  if(game.boosters>=1) unlock("First Booster")
  if(game.boosters>=10) unlock("Addicted")
  if(game.mythics>=3) unlock("Mythic Hunter")
}

// MYSTERY
function mysteryEvent(){
  let e=[
    "💎 Black Lotus!!",
    "😭 Trash booster",
    "🔥 Double mythic!",
    "✨ All foil!"
  ]
  gameDiv.innerText=e[Math.floor(Math.random()*e.length)]
}

// STATS
function updateStats(){
  let total=sets.reduce((a,b)=>a+b.count,0)
  stats.innerText="Total boosters: "+total
}

// CHART
function chartUpdate(){
  let total=sets.reduce((a,b)=>a+b.count,0)

  if(window.chart) chart.destroy()
  window.chart=new Chart(chart,{
    type:"doughnut",
    data:{
      labels:["Boosters"],
      datasets:[{data:[total],backgroundColor:["#4caf50"]}]
    }
  })
}

render()

</script>
</body>
</html>
